<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cast Test Receiver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 40px;
    }

    .time {
      font-size: 120px;
      font-weight: 200;
      letter-spacing: -4px;
      text-shadow: 0 4px 30px rgba(0,0,0,0.5);
    }

    .date {
      font-size: 32px;
      opacity: 0.8;
      margin-top: 10px;
    }

    .message {
      font-size: 48px;
      margin-top: 60px;
      padding: 20px 40px;
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }

    .status {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 14px;
      opacity: 0.5;
    }

    .dynamic-content {
      margin-top: 40px;
      font-size: 24px;
      opacity: 0.7;
    }

    .header {
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 48px;
      font-weight: 300;
      opacity: 0.9;
      margin: 0;
    }

    .clock-section {
      margin-bottom: 40px;
    }

    .recent-section {
      max-width: 800px;
      margin: 0 auto;
      text-align: left;
      display: none; /* Hidden until tracks are sent */
    }

    .recent-section h2 {
      font-size: 24px;
      opacity: 0.7;
      margin-bottom: 20px;
      text-align: center;
    }

    .recent-tracks {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .track-item {
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 12px 16px;
    }

    .track-art {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      object-fit: cover;
      background: rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
    }

    .track-info {
      flex: 1;
      min-width: 0;
    }

    .track-title {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 14px;
      opacity: 0.7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-time {
      font-size: 12px;
      opacity: 0.5;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container" id="clockContainer">
    <!-- Header with custom title -->
    <div class="header">
      <h1 id="pageTitle">Lyric Scroll</h1>
    </div>

    <!-- Clock section -->
    <div class="clock-section">
      <div class="time" id="time">--:--:--</div>
      <div class="date" id="date">Loading...</div>
    </div>

    <!-- Recently played section -->
    <div class="recent-section" id="recentSection">
      <h2>Recently Played</h2>
      <div class="recent-tracks" id="recentTracks">
        <!-- Tracks inserted dynamically -->
      </div>
    </div>
  </div>
  <div class="status" id="status">Receiver Ready</div>

  <iframe id="urlFrame" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; border:none; z-index:1000;"></iframe>

  <!-- Cast Receiver SDK -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <script>
    // Dynamic content updates
    function updateTime() {
      const now = new Date();
      document.getElementById('time').textContent = now.toLocaleTimeString();
      document.getElementById('date').textContent = now.toLocaleDateString('en-US', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
    }

    setInterval(updateTime, 1000);
    updateTime();

    // Initialize Cast Receiver
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    // Handle custom messages from sender
    const NAMESPACE = 'urn:x-cast:com.casttest.custom';

    context.addCustomMessageListener(NAMESPACE, (event) => {
      console.log('Received message:', event.data);

      if (event.data.message) {
        document.getElementById('message').textContent = event.data.message;
      }

      if (event.data.background) {
        document.body.style.background = event.data.background;
      }

      // Set page title
      if (event.data.title) {
        document.getElementById('pageTitle').textContent = event.data.title;
      }

      // Update recently played tracks
      if (event.data.recentTracks) {
        updateRecentTracks(event.data.recentTracks);
      }

      // Clear recent tracks
      if (event.data.clearRecentTracks) {
        document.getElementById('recentTracks').innerHTML = '';
      }

      if (event.data.loadUrl) {
        console.log('Loading URL:', event.data.loadUrl);
        const frame = document.getElementById('urlFrame');
        const clock = document.getElementById('clockContainer');
        frame.src = event.data.loadUrl;
        frame.style.display = 'block';
        clock.style.display = 'none';
        document.getElementById('status').textContent = 'Showing: ' + event.data.loadUrl;
      }

      if (event.data.clearUrl) {
        console.log('Clearing URL');
        const frame = document.getElementById('urlFrame');
        const clock = document.getElementById('clockContainer');
        frame.src = '';
        frame.style.display = 'none';
        clock.style.display = 'block';
        document.getElementById('status').textContent = 'Clock mode';
      }
    });

    function updateRecentTracks(tracks) {
      const container = document.getElementById('recentTracks');
      container.innerHTML = '';

      tracks.slice(0, 5).forEach(track => {
        const item = document.createElement('div');
        item.className = 'track-item';

        const timeAgo = formatTimeAgo(track.playedAt);

        item.innerHTML = `
          <img class="track-art"
               src="${track.albumArt || ''}"
               alt=""
               onerror="this.style.visibility='hidden'">
          <div class="track-info">
            <div class="track-title">${escapeHtml(track.title || 'Unknown')}</div>
            <div class="track-artist">${escapeHtml(track.artist || 'Unknown Artist')}</div>
          </div>
          <div class="track-time">${timeAgo}</div>
        `;

        container.appendChild(item);
      });

      // Show/hide section based on tracks
      document.getElementById('recentSection').style.display = tracks.length > 0 ? 'block' : 'none';
    }

    function formatTimeAgo(isoString) {
      if (!isoString) return '';
      const date = new Date(isoString);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);

      if (diffMins < 1) return 'Just now';
      if (diffMins < 60) return `${diffMins}m ago`;
      const diffHours = Math.floor(diffMins / 60);
      if (diffHours < 24) return `${diffHours}h ago`;
      return date.toLocaleDateString();
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Start the receiver
    const options = new cast.framework.CastReceiverOptions();
    options.disableIdleTimeout = true; // Keep receiver alive

    context.start(options);
    document.getElementById('status').textContent = 'Cast Receiver Connected';
  </script>
</body>
</html>
