<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cast Test Receiver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    .container {
      display: grid;
      grid-template-columns: 60% 40%;
      height: 100vh;
      padding: 40px;
      gap: 40px;
    }

    .left-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .right-panel {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding-top: 60px;
    }

    .time {
      font-size: 120px;
      font-weight: 200;
      letter-spacing: -4px;
      text-shadow: 0 4px 30px rgba(0,0,0,0.5);
    }

    .date {
      font-size: 32px;
      opacity: 0.8;
      margin-top: 10px;
    }

    .status {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 14px;
      opacity: 0.5;
    }

    .header {
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 48px;
      font-weight: 300;
      opacity: 0.9;
      margin: 0;
      text-align: center;
    }

    .clock-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .weather-section {
      text-align: center;
      margin-top: 40px;
      display: none;
    }

    .weather-icon {
      margin-bottom: 10px;
    }

    .weather-icon img {
      width: 64px;
      height: 64px;
    }

    .weather-temp {
      font-size: 48px;
      font-weight: 300;
      margin-bottom: 8px;
    }

    .weather-desc {
      font-size: 20px;
      opacity: 0.8;
      margin-bottom: 4px;
      text-transform: capitalize;
    }

    .weather-location {
      font-size: 16px;
      opacity: 0.6;
    }

    .habits-section {
      text-align: center;
      margin-top: 30px;
      display: none;
    }

    .habits-title {
      font-size: 20px;
      opacity: 0.7;
      margin-bottom: 16px;
    }

    .habits-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 400px;
      margin: 0 auto;
    }

    .habit-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 12px 16px;
      text-align: left;
    }

    .habit-color {
      width: 8px;
      height: 40px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .habit-info {
      flex: 1;
      min-width: 0;
    }

    .habit-name {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .habit-target {
      font-size: 12px;
      opacity: 0.6;
    }

    .habit-progress {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .habit-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
    }

    .habit-dot.filled {
      background: currentColor;
    }

    #widget-frame {
      width: 100%;
      height: 400px;
      border: none;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      margin-bottom: 20px;
      display: none;
    }

    .recent-section {
      max-width: 100%;
      text-align: left;
      display: none; /* Hidden until tracks are sent */
    }

    .recent-section h2 {
      font-size: 20px;
      opacity: 0.7;
      margin-bottom: 16px;
      text-align: center;
    }

    .recent-tracks {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .track-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 10px 12px;
    }

    .track-art {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      object-fit: cover;
      background: rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
    }

    .track-info {
      flex: 1;
      min-width: 0;
    }

    .track-title {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 13px;
      opacity: 0.7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-time {
      font-size: 11px;
      opacity: 0.5;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container" id="clockContainer">
    <!-- Left Panel: Clock + Weather -->
    <div class="left-panel">
      <!-- Header with custom title -->
      <div class="header">
        <h1 id="pageTitle">Lyric Scroll</h1>
      </div>

      <!-- Clock section -->
      <div class="clock-section">
        <div class="time" id="time">--:--:--</div>
        <div class="date" id="date">Loading...</div>
      </div>

      <!-- Weather section -->
      <div class="weather-section" id="weather-section">
        <div class="weather-icon" id="weather-icon"></div>
        <div class="weather-temp" id="weather-temp"></div>
        <div class="weather-desc" id="weather-desc"></div>
        <div class="weather-location" id="weather-location"></div>
      </div>

      <!-- Recently played section -->
      <div class="recent-section" id="recentSection">
        <h2>Recently Played</h2>
        <div class="recent-tracks" id="recentTracks">
          <!-- Tracks inserted dynamically -->
        </div>
      </div>
    </div>

    <!-- Right Panel: Habits + Widget iframe -->
    <div class="right-panel">
      <!-- Habits section -->
      <div class="habits-section" id="habits-section">
        <div class="habits-title" id="habits-title">Today's Habits</div>
        <div class="habits-grid" id="habits-grid"></div>
      </div>

      <!-- Widget iframe -->
      <iframe id="widget-frame"></iframe>
    </div>
  </div>
  <div class="status" id="status">Receiver Ready</div>

  <iframe id="urlFrame" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; border:none; z-index:1000;"></iframe>

  <!-- Cast Receiver SDK -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <script>
    // Dynamic content updates
    function updateTime() {
      const now = new Date();
      document.getElementById('time').textContent = now.toLocaleTimeString();
      document.getElementById('date').textContent = now.toLocaleDateString('en-US', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
    }

    setInterval(updateTime, 1000);
    updateTime();

    // Weather functionality
    let weatherConfig = null;
    let weatherRefreshInterval = null;

    async function fetchWeather() {
      if (!weatherConfig || !weatherConfig.apiKey) return;
      try {
        const url = `https://api.openweathermap.org/data/2.5/weather?zip=${weatherConfig.zip},us&appid=${weatherConfig.apiKey}&units=${weatherConfig.units || 'imperial'}`;
        const resp = await fetch(url);
        const data = await resp.json();
        updateWeatherUI(data);
      } catch (e) {
        console.error('Weather fetch failed:', e);
      }
    }

    function updateWeatherUI(data) {
      document.getElementById('weather-section').style.display = 'block';
      document.getElementById('weather-temp').textContent = Math.round(data.main.temp) + '°' + (weatherConfig.units === 'imperial' ? 'F' : 'C');
      document.getElementById('weather-desc').textContent = data.weather[0].description;
      document.getElementById('weather-location').textContent = data.name;
      document.getElementById('weather-icon').innerHTML = `<img src="https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png" alt="">`;
    }

    function updateHabitsUI(neohabitData) {
      if (!neohabitData || !neohabitData.habits) return;

      const section = document.getElementById('habits-section');
      const grid = document.getElementById('habits-grid');
      const title = document.getElementById('habits-title');

      title.textContent = neohabitData.projectName || "Today's Habits";
      grid.innerHTML = '';

      const today = new Date().toISOString().split('T')[0];

      neohabitData.habits.forEach(habit => {
        const item = document.createElement('div');
        item.className = 'habit-item';

        // Calculate progress for today
        let target = null;
        if (habit.targets && habit.targets.length > 0) {
          // Get the most recent target
          target = habit.targets[habit.targets.length - 1];
        }

        // Count today's completions
        let todayCount = 0;
        if (habit.data) {
          habit.data.forEach(d => {
            if (d.date && d.date.startsWith(today)) {
              todayCount += (d.value !== undefined ? 1 : 1);
            }
          });
        }

        // Build progress dots
        let progressHtml = '';
        if (target && target.value) {
          const targetValue = target.value;
          for (let i = 0; i < targetValue; i++) {
            const filled = i < todayCount ? 'filled' : '';
            progressHtml += `<div class="habit-dot ${filled}" style="color: ${habit.color}"></div>`;
          }
        }

        // Target text
        let targetText = '';
        if (target) {
          if (target.period === 1) {
            targetText = `${target.value}x daily`;
          } else if (target.period === 7) {
            targetText = `${target.value}x weekly`;
          } else {
            targetText = `${target.value}x per ${target.period} days`;
          }
        } else {
          targetText = 'Tracking';
        }

        item.innerHTML = `
          <div class="habit-color" style="background: ${habit.color}"></div>
          <div class="habit-info">
            <div class="habit-name">${escapeHtml(habit.name)}</div>
            <div class="habit-target">${targetText}</div>
          </div>
          <div class="habit-progress">${progressHtml}</div>
        `;

        grid.appendChild(item);
      });

      section.style.display = 'block';
    }

    // Iframe rotation functionality
    let iframeUrls = [];
    let currentUrlIndex = 0;
    let iframeRotationInterval = null;

    function startIframeRotation(urls, seconds) {
      stopIframeRotation();
      iframeUrls = urls;
      if (urls.length === 0) {
        document.getElementById('widget-frame').style.display = 'none';
        return;
      }
      const frame = document.getElementById('widget-frame');
      frame.style.display = 'block';
      frame.src = urls[0];
      currentUrlIndex = 0;

      if (urls.length > 1) {
        iframeRotationInterval = setInterval(() => {
          currentUrlIndex = (currentUrlIndex + 1) % urls.length;
          frame.src = urls[currentUrlIndex];
        }, seconds * 1000);
      }
    }

    function stopIframeRotation() {
      if (iframeRotationInterval) {
        clearInterval(iframeRotationInterval);
        iframeRotationInterval = null;
      }
    }

    function handleFallbackConfig(config) {
      // Weather
      if (config.weather && config.weather.apiKey) {
        weatherConfig = config.weather;
        fetchWeather();
        if (weatherRefreshInterval) clearInterval(weatherRefreshInterval);
        weatherRefreshInterval = setInterval(fetchWeather, 15 * 60 * 1000); // 15 min
      }
      // Iframes
      if (config.iframes && config.iframes.length > 0) {
        startIframeRotation(config.iframes, config.rotationSeconds || 30);
      }
    }

    // Initialize Cast Receiver
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    // Handle custom messages from sender
    const NAMESPACE = 'urn:x-cast:com.casttest.custom';

    context.addCustomMessageListener(NAMESPACE, (event) => {
      console.log('Received message:', event.data);

      if (event.data.message) {
        document.getElementById('message').textContent = event.data.message;
      }

      if (event.data.background) {
        document.body.style.background = event.data.background;
      }

      // Set page title
      if (event.data.title) {
        document.getElementById('pageTitle').textContent = event.data.title;
      }

      // Update recently played tracks
      if (event.data.recentTracks) {
        updateRecentTracks(event.data.recentTracks);
      }

      // Clear recent tracks
      if (event.data.clearRecentTracks) {
        document.getElementById('recentTracks').innerHTML = '';
      }

      // Handle fallback configuration
      if (event.data.fallbackConfig) {
        handleFallbackConfig(event.data.fallbackConfig);
      }

      // Handle Neohabit data
      if (event.data.fallbackConfig && event.data.fallbackConfig.neohabit) {
        updateHabitsUI(event.data.fallbackConfig.neohabit);
      }

      if (event.data.loadUrl) {
        console.log('Loading URL:', event.data.loadUrl);
        const frame = document.getElementById('urlFrame');
        const clock = document.getElementById('clockContainer');
        frame.src = event.data.loadUrl;
        frame.style.display = 'block';
        clock.style.display = 'none';
        document.getElementById('status').textContent = 'Showing: ' + event.data.loadUrl;
      }

      if (event.data.clearUrl) {
        console.log('Clearing URL');
        const frame = document.getElementById('urlFrame');
        const clock = document.getElementById('clockContainer');
        frame.src = '';
        frame.style.display = 'none';
        clock.style.display = 'block';
        document.getElementById('status').textContent = 'Clock mode';
      }
    });

    function updateRecentTracks(tracks) {
      const container = document.getElementById('recentTracks');
      container.innerHTML = '';

      tracks.slice(0, 5).forEach(track => {
        const item = document.createElement('div');
        item.className = 'track-item';

        const timeAgo = formatTimeAgo(track.playedAt);

        item.innerHTML = `
          <img class="track-art"
               src="${track.albumArt || ''}"
               alt=""
               onerror="this.style.visibility='hidden'">
          <div class="track-info">
            <div class="track-title">${escapeHtml(track.title || 'Unknown')}</div>
            <div class="track-artist">${escapeHtml(track.artist || 'Unknown Artist')}</div>
          </div>
          <div class="track-time">${timeAgo}</div>
        `;

        container.appendChild(item);
      });

      // Show/hide section based on tracks
      document.getElementById('recentSection').style.display = tracks.length > 0 ? 'block' : 'none';
    }

    function formatTimeAgo(isoString) {
      if (!isoString) return '';
      const date = new Date(isoString);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);

      if (diffMins < 1) return 'Just now';
      if (diffMins < 60) return `${diffMins}m ago`;
      const diffHours = Math.floor(diffMins / 60);
      if (diffHours < 24) return `${diffHours}h ago`;
      return date.toLocaleDateString();
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Start the receiver
    const options = new cast.framework.CastReceiverOptions();
    options.disableIdleTimeout = true; // Keep receiver alive

    context.start(options);
    document.getElementById('status').textContent = 'Cast Receiver Connected';
  </script>
</body>
</html>
